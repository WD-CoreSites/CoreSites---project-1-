<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – ShopEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Checkout</h2>

<div id="order-summary"></div>
<h3 id="order-total"></h3>

<h2>Shipping Information</h2>
<form id="shipping-form">
    <input type="text" id="full-name" placeholder="Full Name" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="text" id="city" placeholder="City" required>
    <input type="text" id="postcode" placeholder="Postcode" required>

    <h2>Billing Information</h2>
    <input type="text" id="card-name" placeholder="Name on Card" required>
    <input type="text" id="card-number" placeholder="Card Number" maxlength="16" required>
    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
    <input type="text" id="cvv" placeholder="CVV" maxlength="3" required>

    <button type="submit" class="primary-btn">Pay & Place Order</button>
</form>

<script>
// Load cart
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const summaryEl = document.getElementById("order-summary");
const totalEl = document.getElementById("order-total");

let total = 0;

// Display items
cart.forEach(item => {
    const itemTotal = item.price * item.quantity;
    total += itemTotal;

    const div = document.createElement("div");
    div.classList.add("checkout-item");
    div.innerHTML = `
        <p><strong>${item.name}</strong></p>
        <p>Quantity: ${item.quantity}</p>
        <p>Price: £${item.price.toFixed(2)}</p>
        <p>Subtotal: £${itemTotal.toFixed(2)}</p>
        <hr>
    `;
    summaryEl.appendChild(div);
});

totalEl.textContent = "Total: £" + total.toFixed(2);

// Handle order submission
document.getElementById("shipping-form").onsubmit = (e) => {
    e.preventDefault();

    const user = JSON.parse(localStorage.getItem("user"));

    // If not logged in → force account creation
    if (!user) {
        alert("You must create an account or log in before placing an order.");
        window.location.href = "register.html";
        return;
    }

    // Simulate sending email receipt
    sendEmailReceipt(user.email, cart, total);

    alert("Payment successful! A receipt has been sent to your email.");
    localStorage.removeItem("cart");
    window.location.href = "index.html";
};

// Fake email sender (simulated)
function sendEmailReceipt(email, cart, total) {
    const order = {
        email,
        cart,
        total,
        date: new Date().toLocaleString()
    };

    // Store last order (simulating email)
    localStorage.setItem("lastOrder", JSON.stringify(order));
}
</script>

</body>
</html>
